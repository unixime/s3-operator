version: "3.8"

services:
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: garage
    restart: unless-stopped
    ports:
      - "3900:3900"   # S3 API
      - "3901:3901"   # Admin API (RPC)
      - "3902:3902"   # Web endpoint (bucket website hosting)
      - "3903:3903"   # K2V API (optional, key-value store)
    volumes:
      - ./conf/garage/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    environment:
      RUST_LOG: "garage=info"

volumes:
  garage_meta:
  garage_data:
